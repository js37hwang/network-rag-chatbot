version: '3.7'

services:
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: netmind-opensearch
    environment:
      - cluster.name=netmind-cluster
      - node.name=netmind-node
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true    # 💡 [엔진] 보안 기능 완전 해제 (HTTP 통신 허용)
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9600:9600"

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.11.0
    container_name: netmind-dashboards
    ports:
      - "5601:5601"
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true # 💡 [대시보드] 로그인창 부수는 치트키 위치 변경
    depends_on:
      - opensearch